name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  native-hooks:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tests/test_plugin.py
